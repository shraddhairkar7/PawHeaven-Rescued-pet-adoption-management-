<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — PawHaven Rescue</title>
    <link rel="stylesheet" href="style.css">
    <script src="api.js"></script>
    <style>
        body.layout-login {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            background:
                radial-gradient(ellipse 80% 60% at 10% 20%, rgba(232, 93, 76, 0.18), transparent),
                radial-gradient(ellipse 60% 50% at 90% 80%, rgba(45, 106, 111, 0.2), transparent),
                linear-gradient(160deg, #fef9f3 0%, #e8f4f2 100%);
        }
        .login-shell {
            display: grid;
            grid-template-columns: 1fr 1fr;
            max-width: 920px;
            width: 100%;
            background: #fff;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 24px 64px rgba(45, 106, 111, 0.15);
            border: 1px solid rgba(45, 106, 111, 0.08);
        }
        .login-hero {
            background: linear-gradient(145deg, #2d6a6f 0%, #1a4d52 55%, #e85d4c 160%);
            color: #fff;
            padding: 2.5rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 1rem;
        }
        .login-hero h1 {
            font-size: 1.85rem;
            font-weight: 800;
            line-height: 1.2;
        }
        .login-hero p {
            opacity: 0.92;
            line-height: 1.5;
            font-size: 0.95rem;
        }
        .login-hero .paw {
            font-size: 2.5rem;
        }
        .login-form-wrap {
            padding: 2.5rem;
        }
        .login-form-wrap h2 {
            font-size: 1.45rem;
            font-weight: 800;
            margin-bottom: 0.25rem;
            color: var(--ink);
        }
        .login-form-wrap .sub {
            color: var(--muted);
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }
        .role-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            margin-bottom: 1.25rem;
        }
        .role-option {
            position: relative;
        }
        .role-option input {
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }
        .role-option label {
            display: block;
            padding: 0.85rem 1rem;
            border: 2px solid #e5e7eb;
            border-radius: 14px;
            text-align: center;
            font-weight: 700;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
        }
        .role-option input:focus + label {
            outline: 2px solid var(--sage);
            outline-offset: 2px;
        }
        .role-option input:checked + label {
            border-color: var(--teal);
            background: rgba(45, 106, 111, 0.08);
            color: var(--teal);
        }
        .field {
            margin-bottom: 1rem;
        }
        .field input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            font-family: inherit;
            font-size: 1rem;
        }
        .field input:focus {
            outline: none;
            border-color: var(--sage);
            box-shadow: 0 0 0 3px rgba(90, 143, 123, 0.2);
        }
        .field label.text-label {
            display: block;
            font-weight: 700;
            font-size: 0.85rem;
            margin-bottom: 0.35rem;
            color: var(--ink);
        }
        .field .input-invalid {
            border-color: #dc2626 !important;
            box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.15) !important;
        }
        #login-error {
            display: none;
            font-size: 0.88rem;
            color: #b91c1c;
            margin-bottom: 0.75rem;
            font-weight: 600;
        }
        .btn-login {
            width: 100%;
            padding: 0.85rem;
            margin-top: 0.5rem;
        }
        .login-footer {
            margin-top: 1.25rem;
            text-align: center;
            font-size: 0.9rem;
            color: var(--muted);
        }
        .login-footer a {
            color: var(--coral);
            font-weight: 700;
            text-decoration: none;
        }
        .login-footer a:hover {
            text-decoration: underline;
        }
        .back-home {
            display: inline-block;
            margin-bottom: 1rem;
            color: var(--muted);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .back-home:hover {
            color: var(--teal);
        }
        @media (max-width: 720px) {
            .login-shell {
                grid-template-columns: 1fr;
            }
            .login-hero {
                padding: 1.75rem;
            }
        }
    </style>
</head>
<body class="layout-login">
    <div class="login-shell">
        <div class="login-hero">
            <span class="paw" aria-hidden="true">🐾</span>
            <h1>Every rescue deserves a home</h1>
            <p>Sign in to manage shelters, adoption applications, medical records, volunteers, and donations — or browse pets as an adopter.</p>
        </div>
        <div class="login-form-wrap">
            <a class="back-home" href="home.html">← Back to home</a>
            <h2>Welcome back</h2>
            <p class="sub">Choose account type, then sign in with the ID and password .</p>
            <!-- <p class="sub" style="font-size:0.8rem;margin-top:-0.75rem;">Demo (after <code style="font-size:0.85em;">npm run init-db</code>): adopter <strong>A001</strong> / <strong>priya123</strong> · staff <strong>ADMIN</strong> / <strong>admin123</strong></p> -->
            <form id="loginForm" novalidate>
                <div class="role-group" role="radiogroup" aria-label="Account type">
                    <div class="role-option">
                        <input type="radio" name="role" id="role-user" value="user" checked>
                        <label for="role-user">Adopter / User</label>
                    </div>
                    <div class="role-option">
                        <input type="radio" name="role" id="role-admin" value="admin">
                        <label for="role-admin">Admin / Staff</label>
                    </div>
                </div>
                <p id="login-error" role="alert"></p>
                <div class="field">
                    <label class="text-label" for="loginId" id="loginId-label">Adopter ID</label>
                    <input type="text" id="loginId" name="loginId" placeholder="e.g. A001" required autocomplete="username" maxlength="30">
                </div>
                <div class="field">
                    <label class="text-label" for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Password" required autocomplete="current-password" minlength="1">
                </div>
                <button type="submit" class="btn btn-primary btn-login">Sign in</button>
            </form>
            <p class="login-footer">New here? <a href="signup.html">Create an adopter account</a></p>
        </div>
    </div>
    <style>
        .visually-hidden {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }
    </style>
    <script>
        (function () {
            var form = document.getElementById("loginForm");
            var errEl = document.getElementById("login-error");
            var idInput = document.getElementById("loginId");
            var passInput = document.getElementById("password");
            var idLabel = document.getElementById("loginId-label");
            var api = window.PawHavenAPI;

            function setError(msg) {
                if (!errEl) return;
                if (msg) {
                    errEl.style.display = "block";
                    errEl.textContent = msg;
                } else {
                    errEl.style.display = "none";
                    errEl.textContent = "";
                }
            }

            function syncRoleLabel() {
                var role = document.querySelector('input[name="role"]:checked');
                role = role ? role.value : "user";
                if (idLabel) {
                    idLabel.textContent =
                        role === "admin" ? "Staff ID" : "Adopter ID";
                }
                if (idInput) {
                    idInput.placeholder =
                        role === "admin" ? "e.g. ADMIN" : "e.g. A001";
                }
            }
            document.querySelectorAll('input[name="role"]').forEach(function (r) {
                r.addEventListener("change", syncRoleLabel);
            });
            syncRoleLabel();

            form.addEventListener("submit", function (e) {
                e.preventDefault();
                setError("");
                idInput.classList.remove("input-invalid");
                passInput.classList.remove("input-invalid");

                var role = document.querySelector('input[name="role"]:checked');
                role = role ? role.value : "user";
                var loginId = (idInput.value || "").trim();
                var password = passInput.value || "";

                if (!loginId) {
                    setError("Enter your ID.");
                    idInput.classList.add("input-invalid");
                    return;
                }
                if (!password) {
                    setError("Enter your password.");
                    passInput.classList.add("input-invalid");
                    return;
                }

                if (!api || !api.fetchJSON) {
                    setError("API client missing. Ensure api.js is loaded.");
                    return;
                }

                api
                    .fetchJSON("/auth/login", {
                        method: "POST",
                        body: { role: role, loginId: loginId, password: password },
                    })
                    .then(function (res) {
                        var r = res && res.role ? res.role : role;
                        try {
                            sessionStorage.setItem("pawhaven_role", r);
                            if (res && res.adopterId)
                                sessionStorage.setItem(
                                    "pawhaven_adopter_id",
                                    res.adopterId
                                );
                            else sessionStorage.removeItem("pawhaven_adopter_id");
                            if (r === "admin") {
                                sessionStorage.setItem(
                                    "pawhaven_staff_id",
                                    loginId
                                );
                                sessionStorage.setItem(
                                    "pawhaven_staff_password",
                                    password
                                );
                            } else {
                                sessionStorage.removeItem("pawhaven_staff_id");
                                sessionStorage.removeItem(
                                    "pawhaven_staff_password"
                                );
                            }
                        } catch (err) {}
                        if (r === "admin") {
                            window.location.href = "index.html";
                        } else {
                            window.location.href = "pets.html";
                        }
                    })
                    .catch(function (err) {
                        setError(err.message || String(err));
                    });
            });
        })();
    </script>
</body>
</html>
