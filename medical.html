<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical records — PawHaven</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .med-toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 0.65rem;
            align-items: flex-end;
            margin-bottom: 1.25rem;
        }
        .med-toolbar input,
        .med-toolbar select {
            padding: 0.55rem 0.85rem;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            font-family: inherit;
        }
        .pet-pick-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .med-pet-card {
            background: #fff;
            border-radius: 10px;
            padding: 0.55rem 0.75rem;
            box-shadow: var(--card-shadow);
            border: 1px solid rgba(45, 106, 111, 0.1);
            cursor: pointer;
            text-align: left;
            font: inherit;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        .med-pet-card:hover {
            border-color: var(--teal);
        }
        .med-pet-card.active {
            border-color: var(--teal);
            box-shadow: 0 0 0 1px rgba(45, 106, 111, 0.2);
        }
        .med-pet-card .med-pet-line {
            font-size: 0.82rem;
            font-weight: 700;
            color: var(--ink);
            margin: 0;
            line-height: 1.35;
        }
        .med-pet-card .sub {
            font-size: 0.72rem;
            color: var(--muted);
            margin-top: 0.15rem;
            line-height: 1.3;
        }
        .detail-panel {
            background: #fff;
            border-radius: var(--radius);
            padding: 1.25rem 1.35rem;
            box-shadow: var(--card-shadow);
            border: 1px solid rgba(45, 106, 111, 0.06);
            margin-bottom: 1.5rem;
        }
        .med-context {
            font-size: 0.8rem;
            color: var(--muted);
            font-weight: 600;
            margin: 0 0 0.85rem;
            padding-bottom: 0.65rem;
            border-bottom: 1px solid rgba(45, 106, 111, 0.08);
        }
        .record-stack {
            display: flex;
            flex-direction: column;
            gap: 0.85rem;
        }
        .record-card {
            border-radius: 12px;
            padding: 1rem 1.1rem;
            background: var(--cream);
            border: 1px solid rgba(45, 106, 111, 0.08);
        }
        .record-card .row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem 1.25rem;
            font-size: 0.9rem;
            margin-top: 0.35rem;
        }
        .record-card .label {
            font-weight: 700;
            color: var(--ink);
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }
        .empty-hint {
            color: var(--muted);
            font-size: 0.95rem;
        }
        .record-actions {
            margin-top: 0.65rem;
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            align-items: center;
        }
        .med-edit-form {
            display: none;
            margin-top: 0.75rem;
            padding-top: 0.75rem;
            border-top: 1px dashed rgba(45, 106, 111, 0.2);
        }
        .med-edit-form.is-open {
            display: block;
        }
        .med-edit-form .form-row {
            margin-bottom: 0.55rem;
        }
        .med-edit-form label {
            display: block;
            font-size: 0.72rem;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 0.2rem;
        }
        .med-edit-form input,
        .med-edit-form textarea {
            width: 100%;
            max-width: 100%;
            padding: 0.45rem 0.55rem;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            font: inherit;
            font-size: 0.88rem;
            box-sizing: border-box;
        }
        .med-edit-form textarea {
            min-height: 3.5rem;
            resize: vertical;
        }
        .med-edit-form .form-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }
    </style>
    <script src="app.js"></script>
    <script src="api.js"></script>
</head>
<body class="layout-admin" data-page="medical">
    <aside class="sidebar" id="sidebar">
        <div class="brand">🐾 PawHaven</div>
        <p class="brand-sub">Clinical data</p>
        <nav>
            <a href="index.html" data-nav>📊 Dashboard</a>
            <a href="pets.html" data-nav>🐕 Pets</a>
            <a href="medical.html" data-nav>🩺 Medical records</a>
            <a href="adoptions.html" data-nav>📋 Adoptions</a>
            <a href="shelters.html" data-nav>🏢 Shelters</a>
            <a href="volunteers.html" data-nav>🤝 Volunteers</a>
            <a href="volunteer-history.html" data-nav>📜 Volunteer history</a>
            <a href="donations.html" data-nav>💚 Donations</a>
            <!-- <a href="home.html" data-nav>🌐 Public site</a> -->
            <a href="login.html" class="nav-logout" data-nav>🚪 Log out</a>
        </nav>
    </aside>

    <main class="main">
        <button type="button" class="menu-toggle" onclick="toggleSidebar()" aria-label="Open menu">☰ Menu</button>
        <h1 class="page-title">Medical records</h1>
        <p class="page-desc" id="med-page-desc">Choose a pet to see visits and vaccines. Staff can edit or delete records below.</p>

        <div class="med-toolbar">
            <input type="search" id="med-pet-search" placeholder="Search pet by name, ID, breed…" aria-label="Search pets">
            <select id="med-sort-pets" aria-label="Sort pet list">
                <option value="name">Sort pets: name</option>
                <option value="id">Sort pets: ID</option>
                <option value="species">Sort pets: species</option>
            </select>
        </div>

        <p id="med-error" class="page-desc" style="color:#b91c1c;display:none;"></p>

        <div class="pet-pick-grid" id="med-pet-grid" aria-live="polite"></div>

        <div class="detail-panel" id="med-detail" style="display:none;">
            <p class="med-context" id="med-detail-title" aria-live="polite"></p>
            <div class="med-toolbar" style="margin-top:0;">
                <select id="med-sort-records" aria-label="Sort records">
                    <option value="date-desc">Newest visit first</option>
                    <option value="date-asc">Oldest visit first</option>
                    <option value="vet">By veterinarian</option>
                </select>
            </div>
            <div class="record-stack" id="med-record-stack"></div>
        </div>
    </main>
    <script>
        (function () {
            var api = window.PawHavenAPI;
            var grid = document.getElementById("med-pet-grid");
            var errEl = document.getElementById("med-error");
            var detail = document.getElementById("med-detail");
            var detailTitle = document.getElementById("med-detail-title");
            var stack = document.getElementById("med-record-stack");
            var searchEl = document.getElementById("med-pet-search");
            var sortPets = document.getElementById("med-sort-pets");
            var sortRecords = document.getElementById("med-sort-records");

            var allPets = [];
            var allMedical = [];
            var selectedPetId = null;

            function getRole() {
                try {
                    return sessionStorage.getItem("pawhaven_role") || "";
                } catch (e) {
                    return "";
                }
            }

            function isAdmin() {
                return getRole() === "admin";
            }

            function syncAdminUi() {
                var show = isAdmin();
                document.querySelectorAll(".admin-only").forEach(function (el) {
                    el.style.display = show ? "" : "none";
                });
            }

            function reloadMedical(done) {
                api
                    .fetchJSON("/medical")
                    .then(function (rows) {
                        allMedical = Array.isArray(rows) ? rows : [];
                        if (typeof done === "function") done();
                    })
                    .catch(function () {
                        if (typeof done === "function") done();
                    });
            }

            function esc(s) {
                return String(s || "")
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/"/g, "&quot;");
            }

            function petIdOf(p) {
                return p.Pet_ID != null ? String(p.Pet_ID) : "";
            }

            function matchesPetSearch(p, q) {
                if (!q) return true;
                q = q.toLowerCase();
                var name = (api.petDisplayName(p) || "").toLowerCase();
                var breed = String(p.Breed || "").toLowerCase();
                var pid = petIdOf(p).toLowerCase();
                var sp = String(p.Species || "").toLowerCase();
                return (
                    name.indexOf(q) !== -1 ||
                    breed.indexOf(q) !== -1 ||
                    pid.indexOf(q) !== -1 ||
                    sp.indexOf(q) !== -1
                );
            }

            function sortPetList(rows, mode) {
                var list = (rows || []).slice();
                list.sort(function (a, b) {
                    if (mode === "id") {
                        return petIdOf(a).localeCompare(petIdOf(b));
                    }
                    if (mode === "species") {
                        var sa = String(a.Species || "").toLowerCase();
                        var sb = String(b.Species || "").toLowerCase();
                        if (sa !== sb) return sa.localeCompare(sb);
                    }
                    var na = (api.petDisplayName(a) || "").toLowerCase();
                    var nb = (api.petDisplayName(b) || "").toLowerCase();
                    return na.localeCompare(nb);
                });
                return list;
            }

            function recordsForPet(pid) {
                return allMedical.filter(function (r) {
                    return String(r.Pet_ID || r.pet_id || "") === pid;
                });
            }

            function sortRecordList(rows, mode) {
                var list = (rows || []).slice();
                list.sort(function (a, b) {
                    if (mode === "vet") {
                        var va = String(a.Vet_Name || "").toLowerCase();
                        var vb = String(b.Vet_Name || "").toLowerCase();
                        return va.localeCompare(vb);
                    }
                    var da = String(a.Checkup_Date || "");
                    var db = String(b.Checkup_Date || "");
                    if (mode === "date-asc") return da.localeCompare(db);
                    return db.localeCompare(da);
                });
                return list;
            }

            function renderPetButtons() {
                var q = (searchEl && searchEl.value) || "";
                q = q.trim();
                var mode = (sortPets && sortPets.value) || "name";
                var filtered = allPets.filter(function (p) {
                    return matchesPetSearch(p, q);
                });
                var sorted = sortPetList(filtered, mode);
                grid.innerHTML = "";
                if (!sorted.length) {
                    grid.innerHTML =
                        '<p class="empty-hint">No pets match. Clear the search or add pets first.</p>';
                    return;
                }
                sorted.forEach(function (p) {
                    var pid = petIdOf(p);
                    var btn = document.createElement("button");
                    btn.type = "button";
                    btn.className =
                        "med-pet-card" +
                        (pid === selectedPetId ? " active" : "");
                    var name = api.petDisplayName(p) || "Pet";
                    var meta = [
                        pid,
                        p.Species || "",
                        p.Breed || "",
                    ]
                        .filter(Boolean)
                        .join(" · ");
                    btn.innerHTML =
                        '<p class="med-pet-line">' +
                        esc(name) +
                        '</p><div class="sub">' +
                        esc(meta) +
                        "</div>";
                    btn.addEventListener("click", function () {
                        selectPet(pid, name);
                    });
                    grid.appendChild(btn);
                });
                syncAdminUi();
            }

            function renderRecords(pid, petName) {
                var mode = (sortRecords && sortRecords.value) || "date-desc";
                var rows = sortRecordList(recordsForPet(pid), mode);
                detailTitle.textContent =
                    "Records for " +
                    (petName || "Pet") +
                    " · " +
                    pid;
                stack.innerHTML = "";
                if (!rows.length) {
                    stack.innerHTML =
                        '<p class="empty-hint">No medical rows for this pet yet. ' +
                        '<span class="admin-only">Create initial data from <a href="addnew.html">Add pet</a>.</span></p>';
                    syncAdminUi();
                    return;
                }
                rows.forEach(function (row) {
                    var rid = row.Record_ID || row.record_id || "—";
                    var visit =
                        row.Checkup_Date ||
                        row.checkup_date ||
                        "";
                    var visitDisp = visit || "—";
                    var vacc =
                        row.Vaccine_Name ||
                        row.vaccine_name ||
                        "—";
                    var vet = row.Vet_Name || row.vet_name || "—";
                    var notes =
                        row.Treatment_Details ||
                        row.treatment_details ||
                        "";
                    var badge =
                        (vacc + "").toLowerCase().indexOf("pend") !== -1 ||
                        (vacc + "").toLowerCase().indexOf("not given") !== -1
                            ? "badge warn"
                            : "badge ok";
                    var wrap = document.createElement("div");
                    wrap.className = "record-card";
                    var view = document.createElement("div");
                    view.className = "record-view";
                    view.innerHTML =
                        '<div><span class="label">Record</span> ' +
                        esc(rid) +
                        " · <span class=\"label\">Visit</span> " +
                        esc(visitDisp) +
                        '</div><div class="row"><span><span class="label">Vet</span> ' +
                        esc(vet) +
                        '</span><span><span class="label">Vaccine</span> <span class="' +
                        badge +
                        '">' +
                        esc(vacc) +
                        "</span></span></div>" +
                        (notes
                            ? '<div style="margin-top:0.5rem;"><span class="label">Treatment / notes</span><br>' +
                              esc(notes) +
                              "</div>"
                            : "");
                    var actions = document.createElement("div");
                    actions.className = "record-actions admin-only";
                    var btnEdit = document.createElement("button");
                    btnEdit.type = "button";
                    btnEdit.className = "btn btn-sm btn-outline";
                    btnEdit.textContent = "Edit";
                    var btnDel = document.createElement("button");
                    btnDel.type = "button";
                    btnDel.className = "btn btn-sm btn-outline";
                    btnDel.style.color = "#b91c1c";
                    btnDel.style.borderColor = "#fecaca";
                    btnDel.textContent = "Delete";
                    actions.appendChild(btnEdit);
                    actions.appendChild(btnDel);
                    var form = document.createElement("form");
                    form.className = "med-edit-form admin-only";
                    form.innerHTML =
                        '<div class="form-row"><label>Veterinarian</label><input type="text" class="inp-vet" value="' +
                        esc(vet === "—" ? "" : vet) +
                        '"></div>' +
                        '<div class="form-row"><label>Checkup date</label><input type="date" class="inp-date" value="' +
                        esc(
                            visit && String(visit).length >= 10
                                ? String(visit).slice(0, 10)
                                : ""
                        ) +
                        '"></div>' +
                        '<div class="form-row"><label>Vaccine</label><input type="text" class="inp-vacc" value="' +
                        esc(vacc === "—" ? "" : vacc) +
                        '"></div>' +
                        '<div class="form-row"><label>Treatment / notes</label><textarea class="inp-notes">' +
                        esc(notes) +
                        "</textarea></div>" +
                        '<div class="form-actions">' +
                        '<button type="submit" class="btn btn-primary btn-sm">Save</button>' +
                        '<button type="button" class="btn btn-outline btn-sm btn-cancel-edit">Cancel</button>' +
                        "</div>";
                    wrap.appendChild(view);
                    wrap.appendChild(actions);
                    wrap.appendChild(form);
                    function showView() {
                        view.style.display = "";
                        actions.style.display = "flex";
                        form.classList.remove("is-open");
                    }
                    function showForm() {
                        view.style.display = "none";
                        actions.style.display = "none";
                        form.classList.add("is-open");
                    }
                    btnEdit.addEventListener("click", function () {
                        showForm();
                    });
                    form.querySelector(".btn-cancel-edit").addEventListener(
                        "click",
                        function (e) {
                            e.preventDefault();
                            showView();
                        }
                    );
                    btnDel.addEventListener("click", function () {
                        if (
                            !confirm(
                                "Delete medical record " +
                                    rid +
                                    "? This cannot be undone."
                            )
                        )
                            return;
                        api
                            .fetchJSON("/medical/" + encodeURIComponent(rid), {
                                method: "DELETE",
                            })
                            .then(function () {
                                reloadMedical(function () {
                                    var match = allPets.find(function (p) {
                                        return petIdOf(p) === pid;
                                    });
                                    renderRecords(
                                        pid,
                                        match
                                            ? api.petDisplayName(match)
                                            : petName
                                    );
                                });
                            })
                            .catch(function (err) {
                                alert(err.message || String(err));
                            });
                    });
                    form.addEventListener("submit", function (e) {
                        e.preventDefault();
                        var body = {
                            Pet_ID: pid,
                            Vet_Name:
                                form.querySelector(".inp-vet").value || "",
                            Checkup_Date:
                                form.querySelector(".inp-date").value ||
                                null,
                            Vaccine_Name:
                                form.querySelector(".inp-vacc").value || "",
                            Treatment_Details:
                                form.querySelector(".inp-notes").value || "",
                        };
                        api
                            .fetchJSON(
                                "/medical/" + encodeURIComponent(rid),
                                {
                                    method: "PUT",
                                    body: body,
                                }
                            )
                            .then(function () {
                                reloadMedical(function () {
                                    var match = allPets.find(function (p) {
                                        return petIdOf(p) === pid;
                                    });
                                    renderRecords(
                                        pid,
                                        match
                                            ? api.petDisplayName(match)
                                            : petName
                                    );
                                });
                            })
                            .catch(function (err) {
                                alert(err.message || String(err));
                            });
                    });
                    stack.appendChild(wrap);
                });
                syncAdminUi();
            }

            function selectPet(pid, name) {
                selectedPetId = pid;
                detail.style.display = "block";
                renderPetButtons();
                renderRecords(pid, name);
                try {
                    history.replaceState(
                        null,
                        "",
                        "medical.html?pet=" + encodeURIComponent(pid)
                    );
                } catch (e) {}
            }

            function qsPet() {
                try {
                    var u = new URL(window.location.href);
                    return (u.searchParams.get("pet") || "").trim();
                } catch (e) {
                    return "";
                }
            }

            if (!api || !api.fetchJSON) {
                if (errEl) {
                    errEl.style.display = "block";
                    errEl.textContent = "API client missing. Open via http://localhost:3000/";
                }
                return;
            }

            var descEl = document.getElementById("med-page-desc");
            if (descEl) {
                descEl.textContent = isAdmin()
                    ? "Choose a pet, then use Edit or Delete on each visit (staff only)."
                    : "Choose a pet to view visit and vaccine history (read-only).";
            }

            Promise.all([api.fetchJSON("/pets"), api.fetchJSON("/medical")])
                .then(function (pair) {
                    allPets = Array.isArray(pair[0]) ? pair[0] : [];
                    allMedical = Array.isArray(pair[1]) ? pair[1] : [];
                    renderPetButtons();
                    var deep = qsPet();
                    if (deep) {
                        var match = allPets.find(function (p) {
                            return petIdOf(p) === deep;
                        });
                        selectPet(
                            deep,
                            match ? api.petDisplayName(match) : deep
                        );
                    } else {
                        detail.style.display = "none";
                    }
                })
                .catch(function (e) {
                    if (errEl) {
                        errEl.style.display = "block";
                        errEl.textContent = e.message || String(e);
                    }
                });

            if (searchEl) {
                searchEl.addEventListener("input", renderPetButtons);
                searchEl.addEventListener("search", renderPetButtons);
            }
            if (sortPets) sortPets.addEventListener("change", renderPetButtons);
            if (sortRecords)
                sortRecords.addEventListener("change", function () {
                    if (!selectedPetId) return;
                    var match = allPets.find(function (p) {
                        return petIdOf(p) === selectedPetId;
                    });
                    renderRecords(
                        selectedPetId,
                        match ? api.petDisplayName(match) : selectedPetId
                    );
                });
        })();
    </script>
</body>
</html>
